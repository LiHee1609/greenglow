<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GreenGlow - Mỹ Phẩm Thuần Chay</title>
  <meta name="description" content="GreenGlow - Mỹ phẩm thuần chay với phong cách tinh giản, hiện đại và thân thiện với làn da." />
  <style>
    :root {
      --green-dark: #1f4d3a;
      --green-soft: #3f6f58;
      --cream: #f6f1e8;
      --white: #ffffff;
      --text: #1e1e1e;
      --muted: #6b6b6b;
      --border: rgba(31, 77, 58, 0.12);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --max-width: 1200px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Arial, sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: linear-gradient(180deg, #ffffff 0%, #f9f7f2 100%);
      color: var(--text);
      line-height: 1.6;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      width: min(92%, var(--max-width));
      margin: 0 auto;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(31, 77, 58, 0.08);
      color: var(--green-dark);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 18px;
    }

    .section {
      padding: 72px 0;
    }

    .section-title {
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.15;
      margin-bottom: 14px;
      color: var(--green-dark);
    }

    .section-subtitle {
      color: var(--muted);
      max-width: 700px;
      margin-bottom: 34px;
      font-size: 16px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(16px);
      background: rgba(255, 255, 255, 0.8);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 14px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      color: var(--green-dark);
      font-size: 20px;
    }

    .brand-logo {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      overflow: hidden;
      background: var(--cream);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
    }

    .cart-button {
background: var(--green-dark);
      color: var(--white);
      border: none;
      padding: 12px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 70px 0 40px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 28px;
      align-items: center;
    }

    .hero-card,
    .glass-card {
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      border-radius: var(--radius-xl);
    }

    .hero-card {
      padding: 48px;
    }

    .hero h1 {
      font-size: clamp(34px, 6vw, 62px);
      line-height: 1.05;
      color: var(--green-dark);
      margin-bottom: 18px;
    }

    .hero p {
      color: var(--muted);
      font-size: 17px;
      margin-bottom: 28px;
      max-width: 620px;
    }

    .hero-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      cursor: pointer;
      padding: 14px 22px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 600;
      transition: 0.25s ease;
    }

    .btn-primary {
      background: var(--green-dark);
      color: var(--white);
      box-shadow: var(--shadow);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      background: #183c2d;
    }

    .btn-secondary {
      background: var(--white);
      color: var(--green-dark);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
    }

    .hero-side {
      padding: 26px;
    }

    .hero-visual {
      border-radius: 24px;
      min-height: 420px;
      background:
        linear-gradient(160deg, rgba(246,241,232,0.95), rgba(255,255,255,0.9)),
        radial-gradient(circle at top right, rgba(63,111,88,0.18), transparent 38%);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
      border: 1px solid var(--border);
    }

    .hero-visual .placeholder {
      color: var(--green-dark);
    }

    .hero-visual h3 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .hero-visual p {
      color: var(--muted);
      margin-bottom: 0;
    }

    .about-grid,
    .checkout-grid,
    .policy-grid,
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card {
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 28px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .card h3 {
      color: var(--green-dark);
      margin-bottom: 12px;
      font-size: 24px;
    }

    .card p {
      color: var(--muted);
    }

    .feature-list {
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }

    .feature-item {
      padding: 16px;
border-radius: var(--radius-md);
      background: #f8faf7;
      border: 1px solid var(--border);
    }

    .feature-item strong {
      display: block;
      color: var(--green-dark);
      margin-bottom: 6px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .product-card {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
    }

    .product-image {
      height: 240px;
      background: linear-gradient(180deg, #f7f3ea 0%, #eef5ef 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--green-soft);
      font-weight: 700;
      padding: 20px;
      text-align: center;
    }

    .product-content {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .product-content h3 {
      font-size: 22px;
      color: var(--green-dark);
    }

    .price {
      font-size: 20px;
      font-weight: 700;
      color: var(--green-dark);
    }

    .product-content p {
      color: var(--muted);
      font-size: 15px;
    }

    .cart-panel {
      position: fixed;
      top: 0;
      right: -420px;
      width: 380px;
      max-width: 100%;
      height: 100vh;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(18px);
      box-shadow: -10px 0 30px rgba(0, 0, 0, 0.12);
      padding: 24px;
      transition: right 0.35s ease;
      z-index: 100;
      display: flex;
      flex-direction: column;
    }

    .cart-panel.open {
      right: 0;
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .cart-header h3 {
      color: var(--green-dark);
      font-size: 24px;
    }

    .close-cart {
      background: transparent;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--green-dark);
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }

    .cart-item {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
    }

    .cart-item h4 {
      color: var(--green-dark);
      margin-bottom: 4px;
    }

    .cart-item p {
      color: var(--muted);
      font-size: 14px;
    }

    .cart-footer {
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .cart-total {
      font-size: 20px;
      font-weight: 700;
      color: var(--green-dark);
      margin-bottom: 14px;
    }

    .empty-cart {
      color: var(--muted);
      text-align: center;
      padding: 30px 10px;
    }

    .checkout-form,
    .payment-methods,
    .policy-box,
    .contact-box {
      display: grid;
      gap: 16px;
    }
.form-group {
      display: grid;
      gap: 8px;
    }

    .form-group label {
      font-weight: 600;
      color: var(--green-dark);
      font-size: 14px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      outline: none;
      font-size: 15px;
      background: #fff;
    }

    .form-group textarea {
      min-height: 110px;
      resize: vertical;
    }

    .payment-option {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      background: #fff;
    }

    .payment-option strong {
      display: block;
      margin-bottom: 6px;
      color: var(--green-dark);
    }

    .payment-note {
      font-size: 14px;
      color: var(--muted);
    }

    .qr-placeholder {
      border: 2px dashed rgba(31, 77, 58, 0.25);
      border-radius: 18px;
      padding: 20px;
